// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
//

// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so
// individual prototypes don't re-roll it. Ships a consistent set of controls so you
// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//

//
// ─────────────────────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `

    background:transparent;flex-shrink:0}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

  <script type="text/babel">

// Rankr Matchup Component — Dark Luxury Arcade Edition
const { useState, useEffect, useRef, useCallback } = React;

function useIsMobile() {
  const [mobile, setMobile] = useState(() => window.innerWidth < 600);
  useEffect(() => {
    const mq = window.matchMedia('(max-width: 599px)');
    const handler = e => setMobile(e.matches);
    mq.addEventListener('change', handler);
    return () => mq.removeEventListener('change', handler);
  }, []);
  return mobile;
}

function RippleEffect({ x, y, color }) {
  return (
    <span style={{
      position: 'absolute', left: x, top: y,
      width: 8, height: 8, borderRadius: '50%',
      background: color,
      transform: 'translate(-50%, -50%) scale(0)',
      animation: 'rankr-ripple 0.55s ease-out forwards',
      pointerEvents: 'none', zIndex: 10,
    }} />
  );
}

function ConfettiParticle({ x, y, color, angle, distance }) {
  return (
    <span style={{
      position: 'fixed', left: x, top: y,
      width: 7, height: 7,
      borderRadius: Math.random() > 0.5 ? '50%' : '2px',
      background: color,
      transform: 'translate(-50%, -50%)',
      animation: 'rankr-confetti 0.7s ease-out forwards',
      '--angle': `${angle}deg`,
      '--dist': `${distance}px`,
      pointerEvents: 'none', zIndex: 9999, opacity: 1,
    }} />
  );
}

function MatchupCard({ item, onSelect, isSelected, isLoser, isIdle, side, mobile }) {
  const [hovered, setHovered] = useState(false);
  const [ripple, setRipple] = useState(null);
  const cardRef = useRef(null);

  const handleClick = (e) => {
    if (!isIdle) return;
    const rect = cardRef.current.getBoundingClientRect();
    setRipple({ x: e.clientX - rect.left, y: e.clientY - rect.top });
    setTimeout(() => setRipple(null), 600);
    onSelect(item, e.clientX, e.clientY);
  };

  const scale = isSelected ? 1.04 : isLoser ? 0.95 : hovered && isIdle ? 1.025 : 1;
  const opacity = isLoser ? 0.35 : 1;

  const glowColor = isSelected ? '#34D399' : '#6366F1';
  const borderColor = isSelected
    ? '#34D399'
    : isLoser
    ? 'rgba(255,255,255,0.04)'
    : hovered && isIdle
    ? 'rgba(99,102,241,0.7)'
    : 'rgba(255,255,255,0.08)';

  const boxShadow = isSelected
    ? `0 0 0 1px #34D399, 0 8px 48px rgba(52,211,153,0.25), 0 2px 8px rgba(0,0,0,0.4)`
    : hovered && isIdle
    ? `0 0 0 1px rgba(99,102,241,0.6), 0 8px 48px rgba(99,102,241,0.2), 0 2px 8px rgba(0,0,0,0.4)`
    : `0 0 0 1px rgba(255,255,255,0.06), 0 4px 24px rgba(0,0,0,0.3)`;

  return (
    <div
      ref={cardRef}
      onClick={handleClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        flex: mobile ? 'none' : 1,
        width: mobile ? '100%' : undefined,
        minWidth: 0,
        background: isSelected

        cursor: isIdle ? 'pointer' : 'default',
        transform: `scale(${scale})`,

        backdropFilter: 'blur(12px)',
        WebkitBackdropFilter: 'blur(12px)',
        transition: 'transform 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.28s ease, box-shadow 0.22s ease, border-color 0.18s ease, background 0.18s ease',
        position: 'relative',
        overflow: 'hidden',
        display: 'flex',
        flexDirection: mobile ? 'row' : 'column',
        alignItems: 'center',
        gap: mobile ? 14 : 20,

        minHeight: mobile ? 96 : undefined,
      }}
    >
      {/* Subtle noise overlay */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 'inherit',
        backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")`,
        opacity: 0.4, pointerEvents: 'none',
      }} />

      {/* Glow pulse on hover */}
      {(hovered || isSelected) && (
        <div style={{
          position: 'absolute', inset: 0, borderRadius: 'inherit',
          background: `radial-gradient(ellipse at 50% 0%, ${glowColor}18 0%, transparent 70%)`,
          pointerEvents: 'none',
          animation: isSelected ? 'none' : 'rankr-glow-pulse 2s ease-in-out infinite',
        }} />
      )}

      {/* Winner badge */}
      <div style={{
        position: 'absolute', top: 12, right: 14,
        background: isSelected ? 'rgba(52,211,153,0.15)' : 'rgba(255,255,255,0.05)',
        border: `1px solid ${isSelected ? 'rgba(52,211,153,0.4)' : 'rgba(255,255,255,0.08)'}`,

        transition: 'all 0.2s ease',

      }}>
        {isSelected ? '✓ Winner' : item.wins + item.losses > 0 ? `${Math.round((item.wins / (item.wins + item.losses)) * 100)}%` : 'Unranked'}
      </div>

      {/* Emoji orb */}
      <div style={{
        width: mobile ? 64 : 96, height: mobile ? 64 : 96,

        border: `1.5px solid ${item.color}44`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: mobile ? 30 : 42,
        transition: 'transform 0.25s cubic-bezier(.34,1.56,.64,1)',

          fontSize: mobile ? 18 : 24, fontWeight: 700,

        <div style={{
          fontSize: mobile ? 12 : 13,

        <div style={{ display: 'flex', gap: mobile ? 12 : 14, alignItems: 'center', marginTop: mobile ? 0 : 4 }}>

}

function StatPill({ label, value, color }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
      <span style={{ fontSize: 14, fontWeight: 700, color, letterSpacing: '-0.02em' }}>{value}</span>
      <span style={{ fontSize: 9.5, color: 'rgba(255,255,255,0.3)', fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase' }}>{label}</span>
    </div>

}

function VSBadge({ mobile }) {
  return (
    <div style={{
      flexShrink: 0,
      width: mobile ? 36 : 44, height: mobile ? 36 : 44,
      borderRadius: '50%',
      background: 'rgba(255,255,255,0.04)',
      border: '1px solid rgba(255,255,255,0.1)',
      backdropFilter: 'blur(8px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: mobile ? 10 : 11, fontWeight: 800,
      color: 'rgba(255,255,255,0.3)', letterSpacing: '0.08em',
      zIndex: 2, position: 'relative',
      boxShadow: '0 2px 12px rgba(0,0,0,0.3)',
    }}>VS</div>

}

function ProgressBar({ current, total, accentColor }) {
  const pct = total > 0 ? Math.min((current / total) * 100, 100) : 0;
  return (
    <div style={{ width: '100%', maxWidth: 480, margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
        <span style={{ fontSize: 11.5, color: 'rgba(255,255,255,0.3)', fontWeight: 500 }}>Round {current} of {total}</span>
        <span style={{ fontSize: 11.5, color: accentColor, fontWeight: 600 }}>{Math.round(pct)}% complete</span>
      </div>
      <div style={{ height: 3, borderRadius: 99, background: 'rgba(255,255,255,0.06)', overflow: 'hidden' }}>
        <div style={{
          height: '100%', width: `${pct}%`,
          background: `linear-gradient(90deg, ${accentColor}, #34D399)`,
          borderRadius: 99, transition: 'width 0.4s cubic-bezier(.4,0,.2,1)',
          boxShadow: `0 0 8px ${accentColor}88`,
        }} />
      </div>
    </div>
  );
}

function MatchupScreen({ pairs, currentIndex, onVote, accentColor }) {
  const mobile = useIsMobile();
  const [animState, setAnimState] = useState('idle');
  const [selectedSide, setSelectedSide] = useState(null);
  const [confetti, setConfetti] = useState([]);
  const [visible, setVisible] = useState(true);
  const [swipeHint, setSwipeHint] = useState(null); // 'left' | 'right' | null
  const pair = pairs[currentIndex];

  const doVote = useCallback((winner, loser, cx, cy) => {
    if (animState !== 'idle') return;
    setSelectedSide(winner.id);
    setAnimState('selected');
    const particles = Array.from({ length: 16 }, (_, i) => ({
      id: i,
      x: cx ?? window.innerWidth / 2,
      y: cy ?? window.innerHeight / 2,
      color: ['#6366F1','#818CF8','#34D399','#A5B4FC','#FCD34D','#6EE7B7'][i % 6],
      angle: (i / 16) * 360, distance: 52 + Math.random() * 56,
    }));
    setConfetti(particles);
    setTimeout(() => setConfetti([]), 800);
    setTimeout(() => {
      setVisible(false);
      setTimeout(() => {
        setAnimState('idle'); setSelectedSide(null);
        setVisible(true); onVote(winner.id, loser.id);
      }, 260);
    }, 500);
  }, [animState, onVote]);

  const handleSelect = (winner, cx, cy) => {
    if (!pair) return;
    const loser = pair[0].id === winner.id ? pair[1] : pair[0];
    doVote(winner, loser, cx, cy);
  };

  // Keyboard: 1/← = left card, 2/→ = right card
  useKeyboardVote(
    useCallback(() => { if (pair && animState === 'idle') doVote(pair[0], pair[1]); }, [pair, animState, doVote]),
    useCallback(() => { if (pair && animState === 'idle') doVote(pair[1], pair[0]); }, [pair, animState, doVote]),
    animState === 'idle'
  );

  // Swipe: left = vote for right card, right = vote for left card
  useSwipeVote(
    useCallback(() => {
      if (pair && animState === 'idle') { setSwipeHint('left'); setTimeout(() => setSwipeHint(null), 400); doVote(pair[1], pair[0]); }
    }, [pair, animState, doVote]),
    useCallback(() => {
      if (pair && animState === 'idle') { setSwipeHint('right'); setTimeout(() => setSwipeHint(null), 400); doVote(pair[0], pair[1]); }
    }, [pair, animState, doVote]),
    animState === 'idle'
  );

  if (!pair) return null;

  return (
    <div style={{ width: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: mobile ? 20 : 32 }}>
      <ProgressBar current={currentIndex} total={pairs.length} accentColor={accentColor} />

      <div style={{ textAlign: 'center' }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,0.25)', letterSpacing: '0.14em', textTransform: 'uppercase' }}>
          Which do you prefer?
        </div>
      </div>

      {/* Swipe direction hint */}
      {swipeHint && (
        <div style={{
          position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%,-50%)',
          zIndex: 9000, pointerEvents: 'none',
          fontSize: 48, opacity: 0.6,
          animation: 'rankr-fadein 0.1s ease',
        }}>
          {swipeHint === 'left' ? '👈' : '👉'}
        </div>
      )}

      <div style={{
        display: 'flex', flexDirection: mobile ? 'column' : 'row',
        gap: mobile ? 10 : 16, alignItems: 'stretch', width: '100%',
        opacity: visible ? 1 : 0, transform: visible ? 'translateY(0)' : 'translateY(10px)',
        transition: 'opacity 0.22s ease, transform 0.22s ease',
        position: 'relative',
      }}>
        <div style={{ flex: 1, position: 'relative' }}>
          <MatchupCard item={pair[0]} onSelect={handleSelect}
            isSelected={selectedSide === pair[0].id}
            isLoser={selectedSide !== null && selectedSide !== pair[0].id}
            isIdle={animState === 'idle'} side="left" mobile={mobile} />
          <KeyHint side="left" mobile={mobile} />
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
          <VSBadge mobile={mobile} />
        </div>
        <div style={{ flex: 1, position: 'relative' }}>
          <MatchupCard item={pair[1]} onSelect={handleSelect}
            isSelected={selectedSide === pair[1].id}
            isLoser={selectedSide !== null && selectedSide !== pair[1].id}
            isIdle={animState === 'idle'} side="right" mobile={mobile} />
          <KeyHint side="right" mobile={mobile} />
        </div>
      </div>

      <div style={{ position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 9999 }}>
        {confetti.map(p => <ConfettiParticle key={p.id} {...p} />)}
      </div>
    </div>
  );
}

Object.assign(window, { MatchupScreen });

  </script>

  <script type="text/babel">

// Rankr Leaderboard — Dark Luxury Edition
const { useState: useStateLB, useEffect: useEffectLB } = React;

function Sparkline({ history, color, width = 72, height = 28 }) {
  if (!history || history.length < 2) {
    return (
      <svg width={width} height={height} style={{ display: 'block' }}>
        <line x1={0} y1={height/2} x2={width} y2={height/2}
          stroke="rgba(255,255,255,0.08)" strokeWidth={1.5} strokeDasharray="3,3" />
      </svg>
    );
  }
  const min = Math.min(...history), max = Math.max(...history);
  const range = max - min || 1;
  const pts = history.map((v, i) => {
    const x = (i / (history.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return `${x},${y}`;
  });
  const pathD = `M ${pts.join(' L ')}`;
  const areaD = `M ${pts[0]} L ${pts.join(' L ')} L ${width},${height} L 0,${height} Z`;
  return (
    <svg width={width} height={height} style={{ display: 'block', overflow: 'visible' }}>
      <defs>
        <linearGradient id={`sg-${color.replace(/[^a-z0-9]/gi,'')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.22" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaD} fill={`url(#sg-${color.replace(/[^a-z0-9]/gi,'')})`} />
      <path d={pathD} fill="none" stroke={color} strokeWidth={1.75} strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={parseFloat(pts[pts.length-1].split(',')[0])} cy={parseFloat(pts[pts.length-1].split(',')[1])}
        r={3} fill={color} />
    </svg>
  );
}

function MomentumBadge({ delta }) {
  if (delta === 0) return (
    <span style={{ fontSize: 10, fontWeight: 600, color: 'rgba(255,255,255,0.2)', background: 'rgba(255,255,255,0.04)', borderRadius: 6, padding: '2px 7px' }}>—</span>
  );
  const up = delta > 0;
  return (
    <span style={{
      fontSize: 10, fontWeight: 700,
      color: up ? '#34D399' : '#F87171',
      background: up ? 'rgba(52,211,153,0.12)' : 'rgba(248,113,113,0.12)',
      borderRadius: 6, padding: '2px 7px',
      display: 'inline-flex', alignItems: 'center', gap: 2,
      border: `1px solid ${up ? 'rgba(52,211,153,0.2)' : 'rgba(248,113,113,0.2)'}`,
    }}>
      {up ? '▲' : '▼'} {Math.abs(Math.round(delta))}
    </span>
  );
}

function RankBadge({ rank }) {
  const medals = { 1: '🥇', 2: '🥈', 3: '🥉' };
  if (medals[rank]) return <span style={{ fontSize: 18, lineHeight: 1 }}>{medals[rank]}</span>;
  return (
    <span style={{
      width: 26, height: 26, borderRadius: '50%',
      background: 'rgba(255,255,255,0.04)',
      color: 'rgba(255,255,255,0.25)',
      fontSize: 11, fontWeight: 700,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      border: '1px solid rgba(255,255,255,0.06)',
    }}>{rank}</span>
  );
}

function LeaderboardRow({ item, rank, accentColor, index }) {
  const [hovered, setHoveredLB] = useStateLB(false);
  const [mobile, setMobileLB] = useStateLB(() => window.innerWidth < 600);
  useEffectLB(() => {
    const mq = window.matchMedia('(max-width: 599px)');
    const h = e => setMobileLB(e.matches);
    mq.addEventListener('change', h);
    return () => mq.removeEventListener('change', h);
  }, []);
  const isTop3 = rank <= 3;
  const winRate = item.wins + item.losses > 0 ? (item.wins / (item.wins + item.losses)) * 100 : 0;

  return (
    <div
      onMouseEnter={() => setHoveredLB(true)}
      onMouseLeave={() => setHoveredLB(false)}
      style={{
        display: 'flex', alignItems: 'center',
        gap: mobile ? 10 : 14,
        padding: mobile ? '11px 12px' : '13px 16px',
        borderRadius: 14,
        background: hovered
          ? 'rgba(99,102,241,0.07)'
          : index % 2 === 0 ? 'rgba(255,255,255,0.015)' : 'transparent',
        border: `1px solid ${hovered ? 'rgba(99,102,241,0.2)' : 'transparent'}`,
        transition: 'all 0.15s ease',
        animation: 'rankr-fadeup 0.35s ease forwards',
        animationDelay: `${index * 0.04}s`,
        opacity: 0,
      }}
    >
      <div style={{ width: 28, flexShrink: 0, display: 'flex', justifyContent: 'center' }}>
        <RankBadge rank={rank} />
      </div>

      <div style={{
        width: 38, height: 38, flexShrink: 0, borderRadius: 10,
        background: `linear-gradient(135deg, ${item.color}33, ${item.color}11)`,
        border: `1.5px solid ${item.color}33`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 18,
      }}>{item.emoji}</div>

      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontSize: 14, fontWeight: 650, color: '#fff',
          letterSpacing: '-0.02em',
          whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
          fontFamily: "'Syne', sans-serif",
        }}>{item.name}</div>
        <div style={{ fontSize: 11.5, color: 'rgba(255,255,255,0.3)', marginTop: 2, display: 'flex', gap: 8 }}>
          <span style={{ color: '#34D399', fontWeight: 600 }}>{item.wins}W</span>
          <span>/</span>
          <span style={{ color: '#F87171', fontWeight: 600 }}>{item.losses}L</span>
          {item.wins + item.losses > 0 && (
            <span>· {Math.round(winRate)}% wr</span>
          )}
        </div>
      </div>

      {!mobile && (
        <div style={{ flexShrink: 0, display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 3 }}>
          <Sparkline history={item.eloHistory} color={isTop3 ? '#818CF8' : 'rgba(255,255,255,0.2)'} width={60} height={22} />
          <div style={{ fontSize: 9.5, color: 'rgba(255,255,255,0.2)', letterSpacing: '0.04em' }}>momentum</div>
        </div>
      )}

      <div style={{ flexShrink: 0, textAlign: 'right', display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4, minWidth: 52 }}>
        <span style={{ fontSize: 16, fontWeight: 700, color: '#fff', letterSpacing: '-0.03em', fontFamily: "'Syne', sans-serif" }}>
          {item.wins + item.losses > 0 ? `${Math.round(winRate)}%` : '—'}
        </span>
        <MomentumBadge delta={item.eloHistory?.length >= 2 ? item.eloHistory[item.eloHistory.length-1] - item.eloHistory[item.eloHistory.length-2] : 0} />
      </div>
    </div>
  );
}

function Leaderboard({ items, accentColor, onReset }) {
  const sorted = [...items].sort((a, b) => {
    const wrA = a.wins + a.losses > 0 ? a.wins / (a.wins + a.losses) : 0;
    const wrB = b.wins + b.losses > 0 ? b.wins / (b.wins + b.losses) : 0;
    if (wrB !== wrA) return wrB - wrA;
    return b.wins - a.wins;
  });
  const totalVotes = items.reduce((s, i) => s + i.wins + i.losses, 0) / 2;

  return (
    <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 20 }}>
      {/* Header */}
      <div style={{ display: 'flex', gap: 12, justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap' }}>
        <div>
          <div style={{ fontSize: 22, fontWeight: 700, color: '#fff', letterSpacing: '-0.04em', fontFamily: "'Syne', sans-serif" }}>
            Rankings
          </div>
          <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.3)', marginTop: 3 }}>
            {Math.round(totalVotes)} matchups · sorted by win rate
          </div>
        </div>
        <button
          onClick={onReset}
          style={{
            background: 'rgba(255,255,255,0.05)', color: 'rgba(255,255,255,0.4)',
            border: '1px solid rgba(255,255,255,0.08)', borderRadius: 10,
            padding: '7px 16px', fontSize: 12.5, fontWeight: 600,
            cursor: 'pointer', letterSpacing: '-0.01em', transition: 'all 0.15s ease', fontFamily: 'inherit',
          }}
          onMouseEnter={e => { e.target.style.background = 'rgba(99,102,241,0.15)'; e.target.style.color = '#818CF8'; e.target.style.borderColor = 'rgba(99,102,241,0.3)'; }}
          onMouseLeave={e => { e.target.style.background = 'rgba(255,255,255,0.05)'; e.target.style.color = 'rgba(255,255,255,0.4)'; e.target.style.borderColor = 'rgba(255,255,255,0.08)'; }}
        >↺ Reset</button>
      </div>

      {/* Bar chart */}
      <div style={{
        background: 'rgba(255,255,255,0.02)',
        border: '1px solid rgba(255,255,255,0.06)',
        borderRadius: 16, padding: '16px 18px',
        display: 'flex', flexDirection: 'column', gap: 10,
      }}>
        <div style={{ fontSize: 10.5, color: 'rgba(255,255,255,0.25)', fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 2 }}>
          Win Rate Distribution
        </div>
        {sorted.slice(0, 5).map((item, i) => {
          const wr = item.wins + item.losses > 0 ? (item.wins / (item.wins + item.losses)) * 100 : 0;
          return (
            <div key={item.id} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ width: 18, fontSize: 11, color: 'rgba(255,255,255,0.25)', fontWeight: 700, textAlign: 'right' }}>{i+1}</div>
              <div style={{ fontSize: 15, width: 22 }}>{item.emoji}</div>
              <div style={{ flex: 1 }}>
                <div style={{ height: 5, borderRadius: 99, background: 'rgba(255,255,255,0.05)', overflow: 'hidden' }}>
                  <div style={{
                    height: '100%', width: `${Math.max(wr, 3)}%`,
                    background: i === 0 ? `linear-gradient(90deg, ${accentColor}, #34D399)` : 'rgba(99,102,241,0.35)',
                    borderRadius: 99, transition: 'width 0.5s cubic-bezier(.4,0,.2,1)',
                    boxShadow: i === 0 ? `0 0 8px ${accentColor}66` : 'none',
                  }} />
                </div>
              </div>
              <div style={{ fontSize: 11.5, fontWeight: 700, color: 'rgba(255,255,255,0.55)', width: 34, textAlign: 'right' }}>
                {item.wins + item.losses > 0 ? `${Math.round(wr)}%` : '—'}
              </div>
            </div>
          );
        })}
      </div>

const { useState: useStateX, useEffect: useEffectX, useRef: useRefX, useCallback: useCallbackX } = React;

// ─── 1. Keyboard shortcuts hook ──────────────────────────────────────────────
function useKeyboardVote(onVoteLeft, onVoteRight, enabled) {
  useEffectX(() => {
    if (!enabled) return;
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === '1' || e.key === 'ArrowLeft')  { e.preventDefault(); onVoteLeft();  }
      if (e.key === '2' || e.key === 'ArrowRight') { e.preventDefault(); onVoteRight(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onVoteLeft, onVoteRight, enabled]);
}

// ─── 2. Swipe hook ───────────────────────────────────────────────────────────
function useSwipeVote(onSwipeLeft, onSwipeRight, enabled) {
  const startX = useRefX(null);
  const startY = useRefX(null);

  useEffectX(() => {
    if (!enabled) return;
    const onTouchStart = (e) => {
      startX.current = e.touches[0].clientX;
      startY.current = e.touches[0].clientY;
    };
    const onTouchEnd = (e) => {
      if (startX.current === null) return;
      const dx = e.changedTouches[0].clientX - startX.current;
      const dy = e.changedTouches[0].clientY - startY.current;
      if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.8) return;
      if (dx < 0) onSwipeLeft();
      else onSwipeRight();
      startX.current = null;
    };
    window.addEventListener('touchstart', onTouchStart, { passive: true });
    window.addEventListener('touchend', onTouchEnd, { passive: true });
    return () => {
      window.removeEventListener('touchstart', onTouchStart);
      window.removeEventListener('touchend', onTouchEnd);
    };
  }, [onSwipeLeft, onSwipeRight, enabled]);
}

// ─── 3. Keyboard hint badge ───────────────────────────────────────────────────
function KeyHint({ side, mobile }) {
  if (mobile) return null;
  const key = side === 'left' ? '1' : '2';

  return (
    <div style={{
      position: 'absolute', bottom: 14, left: side === 'left' ? 14 : undefined, right: side === 'right' ? 14 : undefined,
      display: 'flex', gap: 4, alignItems: 'center',

      animation: 'rankr-fadeup 0.5s ease forwards',

          background: 'rgba(255,255,255,0.06)',

  );
}

function ProgressRing({ pct, size = 44, stroke = 3, color = '#6366F1', emoji, done }) {
  const r = (size - stroke * 2) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke="rgba(255,255,255,0.06)" strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none"
          stroke={done ? '#34D399' : color} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset}
          strokeLinecap="round"

// ─── ELO Engine ──────────────────────────────────────────────────────────────
const K = 32;
function expectedScore(ra, rb) { return 1 / (1 + Math.pow(10, (rb - ra) / 400)); }
function newElo(winner, loser) {
  const ea = expectedScore(winner.elo, loser.elo);
  const eb = expectedScore(loser.elo, winner.elo);
  return { winnerElo: winner.elo + K * (1 - ea), loserElo: loser.elo + K * (0 - eb) };
}

// ─── Pair generator ──────────────────────────────────────────────────────────
function generatePairs(items) {
  const pairs = [];
  const ids = items.map(i => i.id);
  for (let i = 0; i < ids.length; i++)
    for (let j = i + 1; j < ids.length; j++)
      pairs.push([ids[i], ids[j]]);
  for (let i = pairs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
  }
  return pairs;
}

function saveState(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }

  useEffect(() => {
    const mq = window.matchMedia('(max-width: 599px)');
    const h = e => setMobile(e.matches);
    mq.addEventListener('change', h);
    return () => mq.removeEventListener('change', h);
  }, []);
  return mobile;
}

// ─── AI Modal ─────────────────────────────────────────────────────────────────
const ITEM_COLORS = ['#6366F1','#EC4899','#F59E0B','#10B981','#F97316','#8B5CF6','#06B6D4','#EF4444'];

function AIModal({ onClose, onAdd, accentColor }) {
  const [query, setQuery] = useState('');
  const [status, setStatus] = useState('idle');
  const [errorMsg, setErrorMsg] = useState('');
  const inputRef = useRef(null);
  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 80); }, []);

  const handleGenerate = async () => {
    const trimmed = query.trim();
    if (!trimmed || status === 'loading') return;
    setStatus('loading'); setErrorMsg('');
    try {
      const prompt = `You are generating items for a 1v1 ranking app called Rankr.
The user wants to rank: "${trimmed}"
Return a JSON object with exactly this shape (no markdown, no explanation, just raw JSON):
{"label":"<emoji> <Category Name>","items":[{"name":"...","emoji":"...","description":"..."},...]}
Rules: Generate 6 to 8 items. "label" starts with a single emoji. Each "name" is 1-4 words. Each "description" is one evocative sentence, 8-14 words. Each "emoji" is a single emoji. No duplicates. Pure JSON only.`;
      const raw = await window.claude.complete(prompt);
      const data = JSON.parse(raw.replace(/```json|```/g,'').trim());
      if (!data.label || !Array.isArray(data.items) || data.items.length < 2) throw new Error('bad shape');
      const baseId = Date.now();
      onAdd({
        id: `custom_${baseId}`, label: data.label,
        items: data.items.map((item, i) => ({
          id: baseId + i, name: item.name, emoji: item.emoji || '⭐',
          color: ITEM_COLORS[i % ITEM_COLORS.length], description: item.description,
          elo: 1200, wins: 0, losses: 0, eloHistory: [1200],
        })),
      });
      setStatus('done');
    } catch {
      setStatus('error'); setErrorMsg('Generation failed. Try a different category name.');
    }
  };

  const examples = ['90s Hip Hop Albums','JavaScript Frameworks','Fast Food Chains','Pixar Movies','Olympic Sports'];

  return (
    <>
      <div onClick={onClose} style={{
        position: 'fixed', inset: 0, zIndex: 1000,
        background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(8px)',
        animation: 'rankr-fadein 0.18s ease forwards',
      }} />
      <div style={{
        position: 'fixed', zIndex: 1001, top: '50%', left: '50%',
        width: 'min(480px, calc(100vw - 32px))',
        background: 'rgba(18,18,28,0.95)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: 22,
        boxShadow: '0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(99,102,241,0.1)',
        backdropFilter: 'blur(24px)',
        padding: '28px 24px 24px',
        display: 'flex', flexDirection: 'column', gap: 20,
        animation: 'rankr-modal-in 0.22s cubic-bezier(.34,1.56,.64,1) forwards',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
          <div>
            <div style={{ fontSize: 18, fontWeight: 700, color: '#fff', letterSpacing: '-0.03em', fontFamily: "'Syne', sans-serif" }}>
              ✨ AI Category Generator
            </div>
            <div style={{ fontSize: 12.5, color: 'rgba(255,255,255,0.4)', marginTop: 4 }}>
              Type any topic — Claude builds it instantly.
            </div>
          </div>
          <button onClick={onClose} style={{
            background: 'rgba(255,255,255,0.06)', border: '1px solid rgba(255,255,255,0.08)',
            borderRadius: 8, width: 28, height: 28, cursor: 'pointer', fontSize: 13,
            color: 'rgba(255,255,255,0.4)', display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>✕</button>
        </div>

        <div style={{ display: 'flex', gap: 8 }}>
          <input ref={inputRef} value={query} onChange={e => setQuery(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') handleGenerate(); if (e.key === 'Escape') onClose(); }}
            disabled={status === 'loading'}
            placeholder="e.g. Pixar Movies, Coffee Drinks…"
            style={{
              flex: 1, padding: '11px 14px', borderRadius: 12,
              border: `1px solid ${query ? 'rgba(99,102,241,0.6)' : 'rgba(255,255,255,0.08)'}`,
              fontSize: 14, fontFamily: "'DM Sans', sans-serif", color: '#fff',
              outline: 'none', background: 'rgba(255,255,255,0.05)',
              transition: 'border-color 0.15s ease',
            }}
          />
          <button onClick={handleGenerate} disabled={!query.trim() || status === 'loading'}
            style={{
              padding: '11px 20px', borderRadius: 12, border: 'none',
              background: !query.trim() || status === 'loading' ? 'rgba(255,255,255,0.06)' : '#6366F1',
              color: !query.trim() || status === 'loading' ? 'rgba(255,255,255,0.25)' : '#fff',
              fontSize: 13.5, fontWeight: 700, cursor: !query.trim() || status === 'loading' ? 'not-allowed' : 'pointer',
              fontFamily: "'DM Sans', sans-serif", whiteSpace: 'nowrap',
              boxShadow: !query.trim() || status === 'loading' ? 'none' : '0 4px 20px rgba(99,102,241,0.4)',
              transition: 'all 0.15s ease',
            }}>
            {status === 'loading' ? '✨ Generating…' : 'Generate →'}
          </button>
        </div>

        {status === 'loading' && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '12px 14px', background: 'rgba(99,102,241,0.08)', borderRadius: 12, border: '1px solid rgba(99,102,241,0.15)' }}>
            <div style={{ width: 15, height: 15, borderRadius: '50%', border: '2px solid rgba(99,102,241,0.3)', borderTop: '2px solid #6366F1', animation: 'rankr-spin 0.7s linear infinite', flexShrink: 0 }} />
            <span style={{ fontSize: 13, color: '#818CF8', fontWeight: 500 }}>Claude is crafting your category…</span>
          </div>
        )}
        {status === 'error' && (
          <div style={{ padding: '11px 14px', background: 'rgba(239,68,68,0.08)', borderRadius: 12, border: '1px solid rgba(239,68,68,0.2)', fontSize: 13, color: '#F87171' }}>
            {errorMsg}
          </div>
        )}
        {status === 'idle' && (
          <div>
            <div style={{ fontSize: 10.5, color: 'rgba(255,255,255,0.2)', fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8 }}>Try these</div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {examples.map(ex => (
                <button key={ex} onClick={() => setQuery(ex)} style={{
                  padding: '5px 12px', borderRadius: 99,
                  border: '1px solid rgba(255,255,255,0.08)', background: 'rgba(255,255,255,0.04)',
                  color: 'rgba(255,255,255,0.45)', fontSize: 12, fontWeight: 500, cursor: 'pointer',
                  fontFamily: "'DM Sans', sans-serif", transition: 'all 0.12s ease',
                }}
                onMouseEnter={e => { e.target.style.borderColor = 'rgba(99,102,241,0.5)'; e.target.style.color = '#818CF8'; }}
                onMouseLeave={e => { e.target.style.borderColor = 'rgba(255,255,255,0.08)'; e.target.style.color = 'rgba(255,255,255,0.45)'; }}
                >{ex}</button>
              ))}
            </div>
          </div>
        )}
      </div>
    </>
  );
}

                  fontSize: 12, color: 'rgba(255,255,255,0.2)', cursor: 'pointer',
                  padding: '0 2px', borderRadius: 4,
                  transition: 'color 0.1s',
                }}

          <div style={{ fontSize: 11, fontWeight: 700, color: 'rgba(255,255,255,0.25)', letterSpacing: '0.1em', textTransform: 'uppercase' }}>
            Pick a category to start
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {categories.map((cat, i) => {
                const totalPairs = cat.items.length * (cat.items.length - 1) / 2;
                const done = indexMap?.[cat.id] || 0;
                const pct = totalPairs > 0 ? Math.min((done / totalPairs) * 100, 100) : 0;
                const isDone = done >= totalPairs && totalPairs > 0;
                return (
                <button key={cat.id} onClick={() => onStart(cat.id)} style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  padding: '12px 16px', borderRadius: 14,
                  border: '1px solid rgba(255,255,255,0.06)',
                  background: 'rgba(255,255,255,0.02)',
                  cursor: 'pointer', fontFamily: "'DM Sans', sans-serif", transition: 'all 0.15s ease',
                }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = 'rgba(99,102,241,0.4)'; e.currentTarget.style.background = 'rgba(99,102,241,0.07)'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(255,255,255,0.06)'; e.currentTarget.style.background = 'rgba(255,255,255,0.02)'; }}
                >
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    <ProgressRing pct={pct} size={40} stroke={2.5} color={accentColor} emoji={cat.label.split(' ')[0]} done={isDone} />
                    <div style={{ textAlign: 'left' }}>
                      <div style={{ fontSize: 14, fontWeight: 600, color: '#fff', letterSpacing: '-0.02em' }}>
                        {cat.label.split(' ').slice(1).join(' ')}
                      </div>
                      <div style={{ fontSize: 11.5, color: 'rgba(255,255,255,0.25)', marginTop: 2 }}>
                        {isDone ? '🎉 All done!' : done > 0 ? `${done} / ${totalPairs} matchups` : `${cat.items.length} items · ${totalPairs} matchups`}
                      </div>
                    </div>
                  </div>
                  <span style={{ fontSize: 15, color: isDone ? '#34D399' : 'rgba(255,255,255,0.2)' }}>{isDone ? '✓' : '→'}</span>
                </button>
                );
              })}

            {/* AI generate row */}
            <button onClick={() => setShowModal(true)} style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '14px 16px', borderRadius: 14,
              border: '1px dashed rgba(99,102,241,0.35)',
              background: 'transparent', cursor: 'pointer',
              fontFamily: "'DM Sans', sans-serif", transition: 'all 0.15s ease',
            }}
            onMouseEnter={e => { e.currentTarget.style.background = 'rgba(99,102,241,0.08)'; e.currentTarget.style.borderStyle = 'solid'; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.borderStyle = 'dashed'; }}
            >
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <span style={{ fontSize: 22 }}>✨</span>
                <div style={{ textAlign: 'left' }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: '#818CF8', letterSpacing: '-0.02em' }}>Generate with AI</div>
                  <div style={{ fontSize: 11.5, color: 'rgba(255,255,255,0.25)', marginTop: 2 }}>Type any topic — Claude builds it for you</div>
                </div>
              </div>
              <span style={{ fontSize: 15, color: '#818CF8' }}>→</span>
            </button>
          </div>
        </div>
      </div>

      {showModal && <AIModal onClose={() => setShowModal(false)} onAdd={(newCat) => { onNewCategory(newCat); setShowModal(false); onStart(newCat.id); }} accentColor={accentColor} />}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function RankrApp({ tweaks }) {
  const accentColor = tweaks?.accentColor || '#6366F1';
  const mobile = useIsMobileApp();

  const [categories, setCategories] = useState(() => loadState()?.categories || DEFAULT_CATEGORIES);

  const [activeCategoryId, setActiveCategoryId] = useState(tweaks?.categoryId || 'travel');

  const [pairsMap, setPairsMap] = useState(() => {
    const saved = loadState();
    if (saved?.pairsMap) return saved.pairsMap;
    const map = {};
    DEFAULT_CATEGORIES.forEach(cat => { map[cat.id] = generatePairs(cat.items); });
    return map;
  });

  const [indexMap, setIndexMap] = useState(() => loadState()?.indexMap || {});
  const [tab, setTab] = useState('rank');
  const [hasStarted, setHasStarted] = useState(() => {
    try { return !!localStorage.getItem('rankr_started'); } catch { return false; }
  });
  const [showOnboarding, setShowOnboarding] = useState(() => {
    try { return !localStorage.getItem('rankr_onboarded'); } catch { return true; }
  });
  const [showShare, setShowShare] = useState(false);

  const activeCategory = categories.find(c => c.id === activeCategoryId) || categories[0];
  const pairs = pairsMap[activeCategoryId] || [];
  const currentIndex = indexMap[activeCategoryId] || 0;
  const isDone = currentIndex >= pairs.length;

  const resolvedPairs = pairs.map(([idA, idB]) => {
    const itemMap = Object.fromEntries(activeCategory.items.map(i => [i.id, i]));
    return [itemMap[idA], itemMap[idB]].filter(Boolean);
  }).filter(p => p.length === 2);

  useEffect(() => { saveState({ categories, pairsMap, indexMap }); }, [categories, pairsMap, indexMap]);

  const handleVote = useCallback((winnerId, loserId) => {
    setCategories(prev => prev.map(cat => {
      if (cat.id !== activeCategoryId) return cat;
      const winner = cat.items.find(i => i.id === winnerId);
      const loser  = cat.items.find(i => i.id === loserId);
      if (!winner || !loser) return cat;
      const { winnerElo, loserElo } = newElo(winner, loser);
      return {
        ...cat, items: cat.items.map(item => {
          if (item.id === winnerId) return { ...item, elo: winnerElo, wins: item.wins + 1, eloHistory: [...(item.eloHistory || [1200]), winnerElo].slice(-12) };
          if (item.id === loserId)  return { ...item, elo: loserElo, losses: item.losses + 1, eloHistory: [...(item.eloHistory || [1200]), loserElo].slice(-12) };
          return item;
        }),
      };
    }));
    setIndexMap(prev => ({ ...prev, [activeCategoryId]: (prev[activeCategoryId] || 0) + 1 }));
  }, [activeCategoryId]);

  const handleReset = useCallback((catId) => {
    const id = catId || activeCategoryId;
    setCategories(prev => prev.map(cat => cat.id !== id ? cat : {
      ...cat, items: cat.items.map(item => ({ ...item, elo: 1200, wins: 0, losses: 0, eloHistory: [1200] })),
    }));
    setPairsMap(prev => {
      const cat = categories.find(c => c.id === id);
      return { ...prev, [id]: cat ? generatePairs(cat.items) : [] };
    });
    setIndexMap(prev => ({ ...prev, [id]: 0 }));
  }, [activeCategoryId, categories]);

  const handleNewCategory = useCallback((newCat) => {
    setCategories(prev => [...prev, newCat]);
    setPairsMap(prev => ({ ...prev, [newCat.id]: generatePairs(newCat.items) }));
    setIndexMap(prev => ({ ...prev, [newCat.id]: 0 }));
  }, []);

  const handleRenameCategory = useCallback((catId, newLabel) => {
    setCategories(prev => prev.map(c => c.id === catId ? { ...c, label: newLabel } : c));
  }, []);

  const handleDeleteCategory = useCallback((catId) => {
    setCategories(prev => prev.filter(c => c.id !== catId));
    setPairsMap(prev => { const n = { ...prev }; delete n[catId]; return n; });
    setIndexMap(prev => { const n = { ...prev }; delete n[catId]; return n; });
    if (activeCategoryId === catId) {
      const remaining = categories.filter(c => c.id !== catId);
      if (remaining.length > 0) setActiveCategoryId(remaining[0].id);
      else setHasStarted(false);
    }
  }, [activeCategoryId, categories]);

  const handleStart = (catId) => {
    try { localStorage.setItem('rankr_started', '1'); } catch {}
    setActiveCategoryId(catId); setHasStarted(true); setTab('rank');
  };

  const handleCategoryChange = (id) => { setActiveCategoryId(id); setTab('rank'); };

  const topItem = [...activeCategory.items].sort((a, b) => {
    const wrA = a.wins + a.losses > 0 ? a.wins / (a.wins + a.losses) : 0;
    const wrB = b.wins + b.losses > 0 ? b.wins / (b.wins + b.losses) : 0;
    return wrB - wrA;
  })[0];

  if (!hasStarted) {
    return (
      <>
        <style>{GLOBAL_STYLES}</style>
        <AnimatedBackground />
        <HomeScreen categories={categories} accentColor={accentColor} mobile={mobile}
          onStart={handleStart} onNewCategory={handleNewCategory}
          indexMap={indexMap} pairsMap={pairsMap} />
      </>
    );
  }

  return (
    <>
      <style>{GLOBAL_STYLES}</style>
      <AnimatedBackground />

      <div style={{
        minHeight: '100vh', position: 'relative', zIndex: 1,
        fontFamily: "'DM Sans', sans-serif",
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        padding: mobile ? '16px 12px 60px' : '28px 16px 80px',
      }}>
        <div style={{ width: '100%', maxWidth: 820, display: 'flex', flexDirection: 'column', gap: 20 }}>

          {/* Header */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: mobile ? 'nowrap' : 'wrap', gap: 12 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <button onClick={() => { try { localStorage.removeItem('rankr_started'); } catch {} setHasStarted(false); }}
                style={{
                  background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.08)',
                  borderRadius: 10, padding: '6px 12px', fontSize: 12.5,
                  color: 'rgba(255,255,255,0.35)', cursor: 'pointer', fontFamily: 'inherit',
                  fontWeight: 600, transition: 'all 0.15s ease', display: 'flex', alignItems: 'center', gap: 4,
                }}
                onMouseEnter={e => { e.currentTarget.style.background = 'rgba(99,102,241,0.12)'; e.currentTarget.style.color = '#818CF8'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'rgba(255,255,255,0.05)'; e.currentTarget.style.color = 'rgba(255,255,255,0.35)'; }}
              >← Home</button>

              {/* Logo */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
                <div style={{
                  width: 32, height: 32, borderRadius: 9,
                  background: 'linear-gradient(135deg, #6366F1, #8B5CF6)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 16, boxShadow: '0 4px 16px rgba(99,102,241,0.4)',
                }}>⚡</div>
                <div>
                  <div style={{ fontSize: 17, fontWeight: 700, color: '#fff', letterSpacing: '-0.04em', lineHeight: 1, fontFamily: "'Syne', sans-serif" }}>Rankr</div>
                  {!mobile && <div style={{ fontSize: 10.5, color: 'rgba(255,255,255,0.3)', letterSpacing: '0.01em' }}>1v1 tournament ranking</div>}
                </div>
              </div>
            </div>
            <TabBar active={tab} onChange={setTab} accentColor={accentColor} mobile={mobile} />
          </div>

          {/* Category selector */}
          <CategorySelector categories={categories} activeId={activeCategoryId}
            onChange={handleCategoryChange} accentColor={accentColor}
            onNewCategory={handleNewCategory}
            onRename={handleRenameCategory}
            onDelete={handleDeleteCategory} />

          {/* Main content card */}
          <div style={{
            background: 'rgba(255,255,255,0.025)',
            border: '1px solid rgba(255,255,255,0.07)',
            borderRadius: mobile ? 18 : 24,
            padding: mobile ? '18px 14px' : '28px 24px',
            backdropFilter: 'blur(16px)',
            boxShadow: '0 24px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.03)',
            minHeight: 400,
          }}>
            {tab === 'rank' ? (
              isDone ? (
                <DoneScreen onViewResults={() => setTab('board')}
                  onReset={() => handleReset(activeCategoryId)} accentColor={accentColor}
                  winner={topItem} category={activeCategory} />
              ) : (
                <MatchupScreen pairs={resolvedPairs} currentIndex={currentIndex}
                  onVote={handleVote} accentColor={accentColor} />
              )
            ) : (
              <Leaderboard items={activeCategory.items} accentColor={accentColor}
                onReset={() => handleReset(activeCategoryId)} />
            )}
          </div>

          {/* Footer */}
          <div style={{ textAlign: 'center', fontSize: 11.5, color: 'rgba(255,255,255,0.15)', letterSpacing: '0.01em' }}>
            Rankings update live · Progress auto-saved · Switch categories freely
          </div>
        </div>
      </div>

      {/* Onboarding hint — first time only */}
      {showOnboarding && tab === 'rank' && !isDone && (
        <OnboardingHint mobile={mobile} onDismiss={() => {
          try { localStorage.setItem('rankr_onboarded', '1'); } catch {}
          setShowOnboarding(false);
        }} />
      )}

      {/* Share modal */}
      {showShare && <ShareModal category={activeCategory} onClose={() => setShowShare(false)} />}
    </>
  );
}

Object.assign(window, { RankrApp });

  </script>

  <script type="text/babel">
    const { useState } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#6366F1",
      "categoryId": "travel"
    }/*EDITMODE-END*/;

    function Root() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      const categoryOptions = [
        { value: 'travel', label: '✈️ Travel' },
        { value: 'food',   label: '🍽️ Food'  },
        { value: 'movies', label: '🎬 Movies' },
      ];

      return (
        <>
          <RankrApp tweaks={tweaks} />
          <TweaksPanel title="Rankr Tweaks">
            <TweakSection label="Accent Color" />
            <TweakColor
              label="Primary"
              value={tweaks.accentColor}
              onChange={v => setTweak('accentColor', v)}
            />
            <TweakSection label="Default Category" />
            <TweakSelect
              label="Start with"
              value={tweaks.categoryId}
              options={categoryOptions}
              onChange={v => setTweak('categoryId', v)}
            />
          </TweaksPanel>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Root />);
  </script>

</body>
</html>
